<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부럽트래블 마케팅 대시보드 - 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(0, 230, 118, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.04) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(15, 20, 35, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      animation: cardAppear 0.6s ease-out;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo img {
      max-width: 160px;
      height: auto;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
    }

    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .login-logo p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .form-input:focus {
      border-color: rgba(99, 102, 241, 0.6);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .spinner { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      display: none;
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid rgba(255, 82, 82, 0.25);
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 16px;
      color: #ff5252;
      font-size: 13px;
      text-align: center;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
        <h1>부럽트래블</h1>
        <p>마케팅 대시보드</p>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">아이디</label>
          <input type="text" id="username" class="form-input" placeholder="아이디를 입력하세요" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn" id="login-btn">
          <span class="btn-text">로그인</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="error-msg" id="error-msg"></div>

      <div class="footer-text">© 2026 Boolub Travel. All rights reserved.</div>
    </div>
  </div>

  <script>
    // If already logged in, redirect to dashboard
    if (localStorage.getItem('boolub_token')) {
      window.location.href = '/';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return;

      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('boolub_token', data.token);
          localStorage.setItem('boolub_user', data.username);
          window.location.href = '/';
        } else {
          errorMsg.innerText = data.error || '아이디 또는 비밀번호가 올바르지 않습니다.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.innerText = '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
